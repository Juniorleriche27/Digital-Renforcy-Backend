name: Digital Renforcy Supabase Keepalive

on:
  schedule:
    - cron: "23 */12 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: digital-renforcy-supabase-keepalive
  cancel-in-progress: false

jobs:
  ping-supabase:
    name: Ping Digital Renforcy Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Validate secrets
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_KEY"

      - name: Ping public schema
        run: |
          curl --fail --silent --show-error \
            --retry 3 \
            --retry-delay 10 \
            --max-time 30 \
            "${SUPABASE_URL%/}/rest/v1/leads?select=id&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}"
